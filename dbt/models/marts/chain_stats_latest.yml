version: 2

models:
  - name: chain_stats_latest
    description: "Latest chain stats by chain_id. Contains the most recent snapshot for each chain from the chain_stats timeseries table."
    config:
      contract:
        enforced: true
      meta:
        primary_key: ["chain_id"]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - chain_id
    columns:
      - name: chain_id
        description: "Chain ID (foreign key to chain.chain_id)"
        data_type: Int64
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('chain')
                field: chain_id
      - name: chain_name
        description: "Human-readable chain name"
        data_type: String
        tests:
          - not_null
      - name: beefy_key
        description: "Beefy-specific chain identifier (foreign key to chain.beefy_key)"
        data_type: String
        tests:
          - not_null
      - name: beefy_enabled
        description: "Whether the chain is currently enabled on Beefy"
        data_type: Bool
        tests:
          - not_null
      - name: date_hour
        description: "Date hour of the latest snapshot for this chain"
        data_type: DateTime('UTC')
        tests:
          - not_null
      - name: tvl_usd
        description: "Total value locked in USD across all product types (latest value)"
        data_type: Nullable(Decimal(76, 20))
      - name: vault_tvl_usd
        description: "TVL attributed to vault assets in USD (latest value)"
        data_type: Nullable(Decimal(76, 20))
      - name: clm_tvl_usd
        description: "TVL attributed to CLM assets in USD (latest value)"
        data_type: Nullable(Decimal(76, 20))
      - name: avg_beefy_performance_fee
        description: "Average Beefy performance fee across all products (latest value)"
        data_type: Nullable(Float64)
      - name: avg_lp_fee
        description: "Average LP fee across all products (latest value)"
        data_type: Nullable(Float64)
      - name: avg_compoundings_per_year
        description: "Average compoundings per year across all products (latest value)"
        data_type: Nullable(Float64)
      - name: avg_apy
        description: "Average APY across all products (latest value)"
        data_type: Nullable(Float64)
      - name: avg_total_apy
        description: "Average total APY across all products (latest value)"
        data_type: Nullable(Float64)
      - name: avg_vault_apr
        description: "Average vault APR across all products (latest value)"
        data_type: Nullable(Float64)
      - name: avg_trading_apr
        description: "Average trading APR across all products (latest value)"
        data_type: Nullable(Float64)
      - name: avg_clm_apr
        description: "Average CLM APR across all products (latest value)"
        data_type: Nullable(Float64)
      - name: avg_reward_pool_apr
        description: "Average reward pool APR across all products (latest value)"
        data_type: Nullable(Float64)
      - name: avg_reward_pool_trading_apr
        description: "Average reward pool trading APR across all products (latest value)"
        data_type: Nullable(Float64)
      - name: avg_vault_apy
